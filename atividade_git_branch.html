<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
      /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2f5; /* Cor para alterar no modo noturno */
        color: #333; /* Cor para alterar no modo noturno */
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .dashboard-container {
        background-color: white; /* Cor para alterar no modo noturno */
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 500px;
        width: 100%;
      }

      h1 {
        color: #007bff;
        margin-bottom: 20px;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .card {
        background: #e9ecef;
        padding: 15px;
        border-radius: 8px;
      }

      .card-value {
        font-size: 24px;
        font-weight: bold;
        display: block;
      }

      .card-label {
        font-size: 14px;
        color: #666;
      }

      .button {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        background-color: #007bff;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      .button:hover {
        background-color: #0056b3;
      }

      .footer {
        position: fixed;
        bottom: 10px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <h1>Dashboard de análise de dados</h1>

      <div class="metrics-grid">
        <div class="card">
          <span class="card-value">94.2%</span>
          <span class="card-label">Acurácia</span>
        </div>
        <div class="card">
          <span class="card-value">1.2s</span>
          <span class="card-label">Latência</span>
        </div>
        <div class="card">
          <span class="card-value">35%</span>
          <span class="card-label">Uso de CPU</span>
        </div>
        <div class="card">
          <span class="card-value">1.2GB / 8GB</span>
          <span class="card-label">Memória RAM</span>
        </div>
      </div>
      <p style="margin-top: 25px; font-size: 12px; color: #999">
        Status do Servidor: <span style="color: green">● Online</span>
      </p>
    </div>

    <button class="button" onclick="location.reload()">Atualizar dados</button>

    <footer class="footer">
      <p>Dashboard v1.0 • Atualizado em 2026</p>
    </footer>
  </body>
</html>
